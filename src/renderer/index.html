<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ClaudeCode UI - 为 ClaudeCode CLI 打造的现代化桌面界面" />
    <title>ClaudeCode UI</title>
    <style>
      /* 内联关键主题 CSS，减少白屏闪烁 */
      :root {
        --color-primary: #c96442;
        --color-secondary: #8b4332;
        --color-accent: #d4a574;
        --bg-primary: #f5f4ed;
        --bg-secondary: #ffffff;
        --bg-tertiary: #e8e6df;
        --bg-elevated: #faf9f5;
        --text-primary: #2d2a26;
        --text-secondary: #6b6660;
        --text-tertiary: #9a9088;
        --text-inverse: #ffffff;
        --font-display: Georgia, 'Times New Roman', serif;
        --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: #f5f4ed;
        color: #2d2a26;
      }
      #root {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
