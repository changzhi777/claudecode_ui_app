# electron-builder 配置文件
appId: com.claudecode.ui
productName: ClaudeCode UI
copyright: Copyright (C) 2026 IoTchange

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - package.json

extraMetadata:
  main: out/main/index.js

mac:
  category: public.app-category.developer-tools
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: default
      arch: arm64
    - target: default
      arch: x64
  icon: build/icon.icns
  minimumSystemVersion: 10.15.0

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  target: nsis

linux:
  target: AppImage
