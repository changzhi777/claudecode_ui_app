<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Claude 官方渐变色 -->
    <linearGradient id="claude-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8A876"/>
      <stop offset="50%" style="stop-color:#D97757"/>
      <stop offset="100%" style="stop-color:#A85C32"/>
    </linearGradient>

    <!-- 阴影效果 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景（白色圆角矩形） -->
  <rect width="1024" height="1024" fill="#ffffff" rx="200" ry="200"/>

  <!-- Claude 螺旋形状（Nautilus Shell 设计） -->
  <g filter="url(#shadow)">
    <path fill="url(#claude-gradient)" d="
      M 512 128
      C 300 128, 128 300, 128 512
      C 128 724, 300 896, 512 896
      C 724 896, 896 724, 896 512
      C 896 350, 750 200, 600 150
      C 550 135, 520 150, 510 200
      C 500 250, 530 280, 580 300
      C 680 340, 750 420, 750 512
      C 750 650, 650 750, 512 750
      C 374 750, 274 650, 274 512
      C 274 374, 374 274, 512 274
      C 580 274, 640 300, 680 350
      C 700 380, 740 370, 750 320
      C 760 270, 720 230, 680 200
      C 620 150, 570 128, 512 128
      Z

      M 512 180
      C 330 180, 180 330, 180 512
      C 180 694, 330 844, 512 844
      C 694 844, 844 694, 844 512
      C 844 370, 720 230, 600 190
      C 560 178, 540 190, 535 220
      C 530 250, 550 270, 590 285
      C 670 315, 730 380, 730 512
      C 730 645, 635 740, 512 740
      C 389 740, 294 645, 294 512
      C 294 379, 389 284, 512 284
      C 570 284, 620 305, 655 345
      C 675 370, 705 360, 715 320
      C 725 280, 690 245, 655 220
      C 600 175, 555 160, 512 160
      L 512 180 Z
    "/>
  </g>

  <!-- 中心眼睛/螺旋点 -->
  <circle fill="#8B4332" cx="512" cy="512" r="50"/>
  <circle fill="#FFFFFF" cx="512" cy="512" r="30"/>
  <circle fill="#D97757" cx="512" cy="512" r="15"/>

  <!-- 高光效果 -->
  <ellipse fill="rgba(255,255,255,0.4)" cx="490" cy="490" rx="20" ry="15" transform="rotate(-45, 490, 490)"/>
</svg>
